<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>幸运大转盘</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@400;700;900&display=swap');

:root {
  --pink: #ff6b9d;
  --purple: #c44dff;
  --blue: #4dc9f6;
  --yellow: #ffd200;
  --orange: #ff9a44;
  --green: #51cf66;
  --bg: #fef6ff;
  --card: #ffffff;
  --shadow: 0 8px 32px rgba(180,100,200,0.15);
  --cute: 'ZCOOL KuaiLe', 'Noto Sans SC', cursive, sans-serif;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: var(--cute);
  background: var(--bg);
  min-height: 100vh;
  min-height: -webkit-fill-available;
  overflow-x: hidden;
  color: #333;
  -webkit-text-size-adjust: 100%;
}

html {
  height: -webkit-fill-available;
}

/* ====== Pages ====== */
.page {
  display: none;
  min-height: 100vh;
  padding: 20px;
  -webkit-animation: pageIn 0.5s ease;
  animation: pageIn 0.5s ease;
}
.page.active {
  display: -webkit-flex;
  display: flex;
  -webkit-flex-direction: column;
  flex-direction: column;
  -webkit-align-items: center;
  align-items: center;
}

@-webkit-keyframes pageIn {
  from { opacity: 0; -webkit-transform: translateY(30px); transform: translateY(30px); }
  to { opacity: 1; -webkit-transform: translateY(0); transform: translateY(0); }
}
@keyframes pageIn {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ====== Floating bubbles bg ====== */
.bubbles {
  position: fixed;
  top: 0; right: 0; bottom: 0; left: 0;
  pointer-events: none; z-index: 0; overflow: hidden;
}
.bubbles span {
  position: absolute; bottom: -60px;
  border-radius: 50%;
  opacity: 0.12;
  -webkit-animation: rise linear infinite;
  animation: rise linear infinite;
}
@-webkit-keyframes rise {
  0% { -webkit-transform: translateY(0) scale(1); transform: translateY(0) scale(1); opacity: 0.12; }
  100% { -webkit-transform: translateY(-110vh) scale(0.3); transform: translateY(-110vh) scale(0.3); opacity: 0; }
}
@keyframes rise {
  0% { transform: translateY(0) scale(1); opacity: 0.12; }
  100% { transform: translateY(-110vh) scale(0.3); opacity: 0; }
}

/* ====== Page 1: Config ====== */
#page1 {
  -webkit-justify-content: center;
  justify-content: center;
  background: linear-gradient(160deg, #fff0f6, #f3f0ff, #e8f8ff);
}
#page1 > * + * { margin-top: 20px; }

.config-card {
  background: var(--card);
  border-radius: 28px;
  padding: 36px 28px;
  box-shadow: var(--shadow);
  width: 100%;
  max-width: 420px;
  position: relative;
  z-index: 1;
}

.config-card h1 {
  text-align: center;
  font-size: 1.8rem;
  background: linear-gradient(135deg, var(--pink), var(--purple));
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 24px;
}

.config-card label {
  display: block;
  font-size: 0.95rem;
  color: #666;
  margin-bottom: 6px;
  margin-top: 14px;
}

.config-card input {
  width: 100%;
  padding: 12px 16px;
  border: 2px solid #f0e0f6;
  border-radius: 14px;
  font-family: var(--cute);
  font-size: 1rem;
  outline: none;
  -webkit-transition: border-color 0.3s, box-shadow 0.3s;
  transition: border-color 0.3s, box-shadow 0.3s;
  background: #fdfaff;
  -webkit-appearance: none;
  appearance: none;
}
.config-card input:focus {
  border-color: var(--purple);
  box-shadow: 0 0 0 4px rgba(196,77,255,0.1);
}

.prize-grid {
  display: -webkit-flex;
  display: flex;
  -webkit-flex-wrap: wrap;
  flex-wrap: wrap;
  margin-top: 8px;
}
.prize-grid .prize-item {
  background: linear-gradient(135deg, #fff5f9, #f5f0ff);
  border-radius: 16px;
  padding: 12px;
  text-align: center;
  width: calc(50% - 6px);
  margin-bottom: 12px;
}
.prize-grid .prize-item:nth-child(odd) { margin-right: 12px; }
.prize-grid .prize-item .award-name {
  font-size: 0.85rem;
  color: var(--pink);
  font-weight: 700;
  margin-bottom: 6px;
}
.prize-grid .prize-item input {
  text-align: center;
  font-size: 0.9rem;
  padding: 8px;
  background: #fff;
}
.prize-grid .prize-item:last-child {
  width: 100%;
  margin-right: 0;
}

.btn-cute {
  display: block;
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 50px;
  font-family: var(--cute);
  font-size: 1.15rem;
  cursor: pointer;
  -webkit-transition: all 0.3s;
  transition: all 0.3s;
  margin-top: 24px;
  color: #fff;
  background: linear-gradient(135deg, var(--pink), var(--purple));
  box-shadow: 0 6px 20px rgba(196,77,255,0.3);
  -webkit-appearance: none;
  appearance: none;
}
.btn-cute:hover {
  -webkit-transform: translateY(-2px);
  transform: translateY(-2px);
  box-shadow: 0 8px 28px rgba(196,77,255,0.4);
}
.btn-cute:active {
  -webkit-transform: translateY(0) scale(0.98);
  transform: translateY(0) scale(0.98);
}

/* ====== Page 2: Home ====== */
#page2 {
  -webkit-justify-content: center;
  justify-content: center;
  background: linear-gradient(160deg, #fff0f6, #f0f8ff, #fff8f0);
  position: relative;
}
#page2 > * + * { margin-top: 28px; }

.edit-btn {
  position: fixed;
  top: 18px; left: 18px;
  z-index: 50;
  background: rgba(255,255,255,0.85);
  border: 2px solid #f0e0f6;
  border-radius: 50px;
  padding: 8px 18px;
  font-family: var(--cute);
  font-size: 0.85rem;
  color: var(--purple);
  cursor: pointer;
  -webkit-backdrop-filter: blur(10px);
  backdrop-filter: blur(10px);
  -webkit-transition: all 0.3s;
  transition: all 0.3s;
  -webkit-appearance: none;
  appearance: none;
}
.edit-btn:hover {
  background: #fff;
  border-color: var(--purple);
  -webkit-transform: scale(1.05);
  transform: scale(1.05);
}

.home-title {
  font-size: 2.4rem;
  text-align: center;
  background: linear-gradient(135deg, var(--pink), var(--purple), var(--blue));
  background-size: 200% auto;
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  -webkit-animation: titleShimmer 4s ease infinite;
  animation: titleShimmer 4s ease infinite;
  position: relative;
  z-index: 1;
}
@-webkit-keyframes titleShimmer {
  0%,100% { background-position: 0% center; }
  50% { background-position: 200% center; }
}
@keyframes titleShimmer {
  0%,100% { background-position: 0% center; }
  50% { background-position: 200% center; }
}

@media (max-width: 480px) {
  .home-title { font-size: 2rem; }
}

.home-prizes {
  display: -webkit-flex;
  display: flex;
  -webkit-flex-wrap: wrap;
  flex-wrap: wrap;
  -webkit-justify-content: center;
  justify-content: center;
  max-width: 460px;
  position: relative;
  z-index: 1;
}
.home-prize-tag {
  background: var(--card);
  border-radius: 16px;
  padding: 10px 20px;
  box-shadow: 0 4px 16px rgba(180,100,200,0.1);
  text-align: center;
  min-width: 80px;
  border: 2px solid transparent;
  -webkit-transition: all 0.3s;
  transition: all 0.3s;
  margin: 6px;
}
.home-prize-tag .award {
  font-size: 0.8rem;
  color: var(--pink);
}
.home-prize-tag .prize {
  font-size: 1rem;
  font-weight: 700;
  color: #444;
  margin-top: 2px;
}

.breathing-btn {
  padding: 16px 48px;
  border: none;
  border-radius: 50px;
  font-family: var(--cute);
  font-size: 1.3rem;
  color: #fff;
  cursor: pointer;
  position: relative;
  z-index: 1;
  background: linear-gradient(135deg, var(--orange), var(--pink));
  box-shadow: 0 6px 24px rgba(255,106,157,0.4);
  -webkit-animation: breathe 2.5s ease-in-out infinite;
  animation: breathe 2.5s ease-in-out infinite;
  -webkit-transition: -webkit-transform 0.2s;
  transition: transform 0.2s;
  -webkit-appearance: none;
  appearance: none;
}
.breathing-btn:hover {
  -webkit-transform: scale(1.06);
  transform: scale(1.06);
}
.breathing-btn:active {
  -webkit-transform: scale(0.97);
  transform: scale(0.97);
}

@-webkit-keyframes breathe {
  0%, 100% { -webkit-transform: scale(1); transform: scale(1); box-shadow: 0 6px 24px rgba(255,106,157,0.4); }
  50% { -webkit-transform: scale(1.08); transform: scale(1.08); box-shadow: 0 10px 40px rgba(255,106,157,0.6); }
}
@keyframes breathe {
  0%, 100% { transform: scale(1); box-shadow: 0 6px 24px rgba(255,106,157,0.4); }
  50% { transform: scale(1.08); box-shadow: 0 10px 40px rgba(255,106,157,0.6); }
}

/* ====== Page 3: Wheel ====== */
#page3 {
  -webkit-justify-content: center;
  justify-content: center;
  background: linear-gradient(160deg, #1a1030, #2d1b69, #1a1030);
  min-height: 100vh;
  position: relative;
}
#page3 > * + * { margin-top: 10px; }

.wheel-wrap {
  position: relative;
  z-index: 1;
}

/* Outer decorative ring */
.wheel-outer {
  position: relative;
  display: inline-block;
}
.wheel-outer::before {
  content: '';
  position: absolute;
  top: -16px; right: -16px; bottom: -16px; left: -16px;
  border-radius: 50%;
  background: conic-gradient(from 0deg, var(--yellow), var(--pink), var(--purple), var(--blue), var(--yellow));
  -webkit-animation: spinGlow 6s linear infinite;
  animation: spinGlow 6s linear infinite;
  -webkit-filter: blur(12px);
  filter: blur(12px);
  opacity: 0.5;
  z-index: -1;
}
@-webkit-keyframes spinGlow { to { -webkit-transform: rotate(360deg); transform: rotate(360deg); } }
@keyframes spinGlow { to { transform: rotate(360deg); } }

canvas#wheelCanvas {
  display: block;
  border-radius: 50%;
  box-shadow:
    0 0 0 5px #2d1b69,
    0 0 0 9px var(--yellow),
    0 0 80px rgba(255,210,0,0.2);
}

/* Pointer */
.wheel-pointer {
  position: absolute;
  top: -18px;
  left: 50%;
  -webkit-transform: translateX(-50%);
  transform: translateX(-50%);
  z-index: 20;
  -webkit-filter: drop-shadow(0 3px 8px rgba(255,50,80,0.6));
  filter: drop-shadow(0 3px 8px rgba(255,50,80,0.6));
}
.wheel-pointer svg { display: block; }

/* Bulbs */
.bulb-ring {
  position: absolute;
  top: -12px; right: -12px; bottom: -12px; left: -12px;
  border-radius: 50%;
  pointer-events: none;
  z-index: 5;
}
.bulb {
  position: absolute;
  width: 10px; height: 10px;
  border-radius: 50%;
  -webkit-animation: bulbPulse 1.2s ease-in-out infinite alternate;
  animation: bulbPulse 1.2s ease-in-out infinite alternate;
}
@-webkit-keyframes bulbPulse {
  0% { opacity: 0.25; -webkit-transform: scale(0.7); transform: scale(0.7); }
  100% { opacity: 1; -webkit-transform: scale(1.2); transform: scale(1.2); }
}
@keyframes bulbPulse {
  0% { opacity: 0.25; transform: scale(0.7); }
  100% { opacity: 1; transform: scale(1.2); }
}

/* Center spin button on wheel — wrapper uses flexbox centering */
.wheel-center-wrap {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: -webkit-flex;
  display: flex;
  -webkit-align-items: center;
  align-items: center;
  -webkit-justify-content: center;
  justify-content: center;
  z-index: 20;
  pointer-events: none;
}
.wheel-center-btn {
  width: 72px; height: 72px;
  border-radius: 50%;
  border: none;
  background: radial-gradient(circle at 35% 35%, #ff8a80, #ff5252);
  color: #fff;
  font-family: var(--cute);
  font-size: 0.85rem;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(255,82,82,0.5), inset 0 2px 6px rgba(255,255,255,0.3);
  -webkit-animation: btnBreathe 2.5s ease-in-out infinite;
  animation: btnBreathe 2.5s ease-in-out infinite;
  -webkit-transition: opacity 0.3s;
  transition: opacity 0.3s;
  letter-spacing: 1px;
  -webkit-appearance: none;
  appearance: none;
  pointer-events: auto;
}
@-webkit-keyframes btnBreathe {
  0%, 100% { -webkit-transform: scale(1); transform: scale(1); box-shadow: 0 4px 20px rgba(255,82,82,0.5); }
  50% { -webkit-transform: scale(1.12); transform: scale(1.12); box-shadow: 0 6px 30px rgba(255,82,82,0.7); }
}
@keyframes btnBreathe {
  0%, 100% { transform: scale(1); box-shadow: 0 4px 20px rgba(255,82,82,0.5); }
  50% { transform: scale(1.12); box-shadow: 0 6px 30px rgba(255,82,82,0.7); }
}
.wheel-center-btn:disabled {
  -webkit-animation: none;
  animation: none;
  opacity: 0.4;
  cursor: default;
}
.wheel-center-btn:not(:disabled):hover { -webkit-filter: brightness(1.1); filter: brightness(1.1); }
.wheel-center-btn:not(:disabled):active {
  -webkit-transform: scale(0.92);
  transform: scale(0.92);
}

/* ====== Page 4: Result ====== */
#page4 {
  -webkit-justify-content: center;
  justify-content: center;
  background: linear-gradient(160deg, #fff0f6, #f5f0ff);
  position: relative;
}
#page4 > * + * { margin-top: 24px; }

.fireworks-canvas {
  position: fixed;
  top: 0; right: 0; bottom: 0; left: 0;
  z-index: 100;
  pointer-events: none;
}

.result-card {
  background: var(--card);
  border-radius: 32px;
  padding: 48px 40px;
  box-shadow: var(--shadow);
  text-align: center;
  z-index: 101;
  -webkit-animation: resultPop 0.6s cubic-bezier(0.175,0.885,0.32,1.275);
  animation: resultPop 0.6s cubic-bezier(0.175,0.885,0.32,1.275);
  max-width: 90vw;
}
@-webkit-keyframes resultPop {
  0% { -webkit-transform: scale(0.3) rotate(-5deg); transform: scale(0.3) rotate(-5deg); opacity: 0; }
  100% { -webkit-transform: scale(1) rotate(0deg); transform: scale(1) rotate(0deg); opacity: 1; }
}
@keyframes resultPop {
  0% { transform: scale(0.3) rotate(-5deg); opacity: 0; }
  100% { transform: scale(1) rotate(0deg); opacity: 1; }
}

.result-card .congrats {
  font-size: 1.3rem;
  color: var(--pink);
  margin-bottom: 20px;
}
.result-card .award-line {
  font-size: 1.6rem;
  color: var(--purple);
  font-weight: 900;
  line-height: 1.6;
}
.result-card .prize-line {
  font-size: 2rem;
  font-weight: 900;
  background: linear-gradient(135deg, var(--orange), var(--pink), var(--purple));
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  line-height: 1.6;
}

.back-btn {
  padding: 14px 44px;
  border: none;
  border-radius: 50px;
  font-family: var(--cute);
  font-size: 1.15rem;
  color: #fff;
  cursor: pointer;
  z-index: 101;
  background: linear-gradient(135deg, var(--purple), var(--blue));
  box-shadow: 0 6px 24px rgba(77,201,246,0.4);
  -webkit-animation: breathe 2.5s ease-in-out infinite;
  animation: breathe 2.5s ease-in-out infinite;
  -webkit-transition: -webkit-transform 0.2s;
  transition: transform 0.2s;
  -webkit-appearance: none;
  appearance: none;
}
.back-btn:hover {
  -webkit-transform: scale(1.06);
  transform: scale(1.06);
}
.back-btn:active {
  -webkit-transform: scale(0.97);
  transform: scale(0.97);
}

/* Stars on page3 */
.stars {
  position: fixed;
  top: 0; right: 0; bottom: 0; left: 0;
  pointer-events: none; z-index: 0;
}
.stars span {
  position: absolute;
  width: 2px; height: 2px;
  background: #fff;
  border-radius: 50%;
  -webkit-animation: twinkle ease-in-out infinite alternate;
  animation: twinkle ease-in-out infinite alternate;
}
@-webkit-keyframes twinkle {
  0% { opacity: 0.1; -webkit-transform: scale(0.5); transform: scale(0.5); }
  100% { opacity: 0.8; -webkit-transform: scale(1.3); transform: scale(1.3); }
}
@keyframes twinkle {
  0% { opacity: 0.1; transform: scale(0.5); }
  100% { opacity: 0.8; transform: scale(1.3); }
}

/* Mobile */
@media (max-width: 480px) {
  .config-card { padding: 28px 20px; }
  .prize-grid .prize-item { width: 100%; margin-right: 0; }
  .prize-grid .prize-item:nth-child(odd) { margin-right: 0; }
}
</style>
</head>
<body>

<!-- Background bubbles -->
<div class="bubbles" id="bubbles"></div>

<!-- ===== Page 1: Config ===== -->
<div class="page" id="page1">
  <div class="config-card">
    <h1>🎡 幸运大转盘配置</h1>

    <label>📝 页面标题</label>
    <input type="text" id="cfgTitle" placeholder="输入转盘标题..." value="幸运大转盘">

    <label>🎁 各等奖品设置</label>
    <div class="prize-grid">
      <div class="prize-item">
        <div class="award-name">🏆 特等奖</div>
        <input type="text" id="cfg0" placeholder="奖品名称">
      </div>
      <div class="prize-item">
        <div class="award-name">🥇 一等奖</div>
        <input type="text" id="cfg1" placeholder="奖品名称">
      </div>
      <div class="prize-item">
        <div class="award-name">🥈 二等奖</div>
        <input type="text" id="cfg2" placeholder="奖品名称">
      </div>
      <div class="prize-item">
        <div class="award-name">🥉 三等奖</div>
        <input type="text" id="cfg3" placeholder="奖品名称">
      </div>
      <div class="prize-item">
        <div class="award-name">💪 再接再厉</div>
        <input type="text" id="cfg4" placeholder="奖品名称">
      </div>
    </div>

    <button class="btn-cute" onclick="saveConfig()">✨ 确认，开始抽奖！</button>
  </div>
</div>

<!-- ===== Page 2: Home ===== -->
<div class="page" id="page2">
  <button class="edit-btn" onclick="goPage(1)">✏️ 修改奖项</button>
  <div class="home-title" id="homeTitle"></div>
  <div class="home-prizes" id="homePrizes"></div>
  <button class="breathing-btn" onclick="goPage(3)">🎯 开始抽奖</button>
</div>

<!-- ===== Page 3: Wheel ===== -->
<div class="page" id="page3">
  <div class="stars" id="stars"></div>
  <div class="wheel-wrap">
    <div class="wheel-outer">
      <div class="wheel-pointer">
        <svg width="36" height="44" viewBox="0 0 36 44">
          <polygon points="18,44 0,4 36,4" fill="#ff5252"/>
          <circle cx="18" cy="8" r="6" fill="#ff5252"/>
          <circle cx="18" cy="8" r="3" fill="#fff" opacity="0.4"/>
        </svg>
      </div>
      <div class="bulb-ring" id="bulbRing"></div>
      <canvas id="wheelCanvas" width="380" height="380"></canvas>
      <div class="wheel-center-wrap">
        <button class="wheel-center-btn" id="spinBtn" onclick="startSpin()">开始<br>抽奖</button>
      </div>
    </div>
  </div>
</div>

<!-- ===== Page 4: Result ===== -->
<div class="page" id="page4">
  <canvas class="fireworks-canvas" id="fwCanvas"></canvas>
  <div class="result-card">
    <div class="congrats">🎊 恭喜你 🎊</div>
    <div class="award-line" id="resultAward"></div>
    <div class="prize-line" id="resultPrize"></div>
  </div>
  <button class="back-btn" onclick="goPage(2)">🏠 返回首页</button>
</div>

<script>
// ====== State ======
var DEFAULTS = {
  title: '\u5e78\u8fd0\u5927\u8f6b\u76d8',
  prizes: ['\u795e\u79d8\u5927\u5956', '\u84dd\u7259\u8033\u673a', '\u5b9a\u5236\u9a6c\u514b\u676f', '\u7cbe\u7f8e\u94a5\u5319\u6263', '\u8c22\u8c22\u53c2\u4e0e']
};

var AWARDS = ['\u7279\u7b49\u5956','\u4e00\u7b49\u5956','\u4e8c\u7b49\u5956','\u4e09\u7b49\u5956','\u518d\u63a5\u518d\u5389'];
var AWARDS_ICONS = ['\ud83c\udfc6','\ud83e\udd47','\ud83e\udd48','\ud83e\udd49','\ud83d\udcaa'];
var COLORS = ['#ff6b6b','#feca57','#48dbfb','#ff9ff3','#54a0ff'];

var config = loadConfig();
var currentAngle = 0;
var spinning = false;
var lastResult = null;

// ====== Config persistence ======
function loadConfig() {
  try {
    var saved = localStorage.getItem('luckyWheelConfig');
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return null;
}

function saveConfig() {
  var title = document.getElementById('cfgTitle').value.trim() || DEFAULTS.title;
  var prizes = [];
  for (var i = 0; i < 5; i++) {
    var v = document.getElementById('cfg' + i).value.trim();
    prizes.push(v || DEFAULTS.prizes[i]);
  }
  config = { title: title, prizes: prizes };
  localStorage.setItem('luckyWheelConfig', JSON.stringify(config));
  goPage(2);
}

// ====== Page navigation ======
function goPage(n) {
  var pages = document.querySelectorAll('.page');
  for (var i = 0; i < pages.length; i++) {
    pages[i].classList.remove('active');
  }
  var page = document.getElementById('page' + n);
  page.classList.add('active');
  page.style.webkitAnimation = 'none';
  page.style.animation = 'none';
  page.offsetHeight;
  page.style.webkitAnimation = '';
  page.style.animation = '';

  if (n === 1) fillConfig();
  if (n === 2) renderHome();
  if (n === 3) initWheel();
  if (n === 4) showResult();
}

// ====== Page 1: Fill config ======
function fillConfig() {
  var c = config || cloneObj(DEFAULTS);
  document.getElementById('cfgTitle').value = c.title || DEFAULTS.title;
  for (var i = 0; i < 5; i++) {
    document.getElementById('cfg' + i).value = (c.prizes && c.prizes[i]) || DEFAULTS.prizes[i];
  }
}

// ====== Page 2: Render home ======
function renderHome() {
  var c = config || cloneObj(DEFAULTS);
  document.getElementById('homeTitle').textContent = c.title || DEFAULTS.title;

  var container = document.getElementById('homePrizes');
  container.innerHTML = '';
  for (var i = 0; i < 5; i++) {
    var tag = document.createElement('div');
    tag.className = 'home-prize-tag';
    tag.innerHTML =
      '<div class="award">' + AWARDS_ICONS[i] + ' ' + AWARDS[i] + '</div>' +
      '<div class="prize">' + ((c.prizes && c.prizes[i]) || DEFAULTS.prizes[i]) + '</div>';
    container.appendChild(tag);
  }
}

// ====== Page 3: Wheel ======
var canvas = document.getElementById('wheelCanvas');
var ctx = canvas.getContext('2d');
var CX = 190, CY = 190, RADIUS = 180;
var SLICE = (2 * Math.PI) / 5;

function initWheel() {
  spinning = false;
  document.getElementById('spinBtn').disabled = false;
  drawWheel(currentAngle);
  createBulbs();
  createStars();
}

function drawWheel(rotation) {
  var c = config || cloneObj(DEFAULTS);
  ctx.clearRect(0, 0, 380, 380);

  for (var i = 0; i < 5; i++) {
    var start = rotation + i * SLICE;
    var end = start + SLICE;

    ctx.beginPath();
    ctx.moveTo(CX, CY);
    ctx.arc(CX, CY, RADIUS, start, end);
    ctx.closePath();

    var grad = ctx.createRadialGradient(CX, CY, 10, CX, CY, RADIUS);
    grad.addColorStop(0, lighten(COLORS[i], 50));
    grad.addColorStop(0.6, COLORS[i]);
    grad.addColorStop(1, darken(COLORS[i], 20));
    ctx.fillStyle = grad;
    ctx.fill();

    ctx.strokeStyle = 'rgba(0,0,0,0.08)';
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.save();
    ctx.beginPath();
    ctx.moveTo(CX, CY);
    ctx.arc(CX, CY, RADIUS, start, end);
    ctx.closePath();
    ctx.clip();
    var innerShadow = ctx.createRadialGradient(CX, CY, RADIUS * 0.3, CX, CY, RADIUS);
    innerShadow.addColorStop(0, 'rgba(255,255,255,0.15)');
    innerShadow.addColorStop(0.7, 'rgba(0,0,0,0)');
    innerShadow.addColorStop(1, 'rgba(0,0,0,0.12)');
    ctx.fillStyle = innerShadow;
    ctx.fillRect(0, 0, 380, 380);
    ctx.restore();

    ctx.save();
    ctx.translate(CX, CY);
    ctx.rotate(start + SLICE / 2);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 15px "ZCOOL KuaiLe", "Noto Sans SC", sans-serif';
    ctx.shadowColor = 'rgba(0,0,0,0.4)';
    ctx.shadowBlur = 4;
    ctx.shadowOffsetX = 1;
    ctx.shadowOffsetY = 1;

    var awardText = AWARDS[i];
    var prizeText = c.prizes ? c.prizes[i] : DEFAULTS.prizes[i];
    ctx.fillText(awardText, RADIUS * 0.55, -10);
    ctx.font = 'bold 13px "ZCOOL KuaiLe", "Noto Sans SC", sans-serif';
    ctx.fillText(prizeText, RADIUS * 0.55, 12);
    ctx.restore();
  }

  ctx.beginPath();
  ctx.arc(CX, CY, 38, 0, Math.PI * 2);
  var cg = ctx.createRadialGradient(CX, CY, 0, CX, CY, 38);
  cg.addColorStop(0, '#3d2b7a');
  cg.addColorStop(1, '#1a1030');
  ctx.fillStyle = cg;
  ctx.fill();
  ctx.strokeStyle = '#ffd200';
  ctx.lineWidth = 3;
  ctx.stroke();
}

function createBulbs() {
  var ring = document.getElementById('bulbRing');
  ring.innerHTML = '';
  var count = 20;
  for (var i = 0; i < count; i++) {
    var angle = (i / count) * Math.PI * 2;
    var bulb = document.createElement('div');
    bulb.className = 'bulb';
    var r = 200;
    var bg = i % 2 === 0 ? '#ffd200' : '#fff';
    var glow = i % 2 === 0 ? '#ffd200' : 'rgba(255,255,255,0.8)';
    bulb.style.cssText =
      'background:' + bg + ';' +
      'box-shadow:0 0 6px ' + glow + ';' +
      'top:' + (190 + Math.sin(angle) * r - 5) + 'px;' +
      'left:' + (190 + Math.cos(angle) * r - 5) + 'px;' +
      'animation-delay:' + ((i % 2) * 0.6) + 's;' +
      '-webkit-animation-delay:' + ((i % 2) * 0.6) + 's;';
    ring.appendChild(bulb);
  }
}

function createStars() {
  var container = document.getElementById('stars');
  if (container.children.length > 0) return;
  for (var i = 0; i < 60; i++) {
    var s = document.createElement('span');
    s.style.cssText =
      'left:' + (Math.random()*100) + '%;' +
      'top:' + (Math.random()*100) + '%;' +
      'animation-duration:' + (1+Math.random()*3) + 's;' +
      '-webkit-animation-duration:' + (1+Math.random()*3) + 's;' +
      'animation-delay:' + (Math.random()*2) + 's;' +
      '-webkit-animation-delay:' + (Math.random()*2) + 's;';
    container.appendChild(s);
  }
}

// ====== Spin logic ======
function startSpin() {
  if (spinning) return;
  spinning = true;
  document.getElementById('spinBtn').disabled = true;

  var winIndex = Math.floor(Math.random() * 5);
  lastResult = winIndex;

  var sliceAngle = SLICE;
  var sliceCenter = winIndex * sliceAngle + sliceAngle / 2;
  var targetBase = -Math.PI / 2 - sliceCenter;

  var wobble = (Math.random() - 0.5) * sliceAngle * 0.3;
  var fullSpins = 6 + Math.floor(Math.random() * 3);
  var targetAngle = targetBase + wobble + fullSpins * Math.PI * 2;

  var startAngle = currentAngle;
  var delta = targetAngle - (startAngle % (Math.PI * 2));

  var totalDist = delta + fullSpins * Math.PI * 2;
  var duration = 5000 + Math.random() * 1500;
  var startTime = performance.now();

  function frame(now) {
    var elapsed = now - startTime;
    var t = Math.min(elapsed / duration, 1);

    var ease;
    if (t < 0.15) {
      ease = (t / 0.15) * (t / 0.15) * 0.15;
    } else {
      var remaining = (t - 0.15) / 0.85;
      var base = 0.15 + 0.85 * (1 - Math.pow(1 - remaining, 4));
      var wobbleAmt = remaining > 0.8 ? Math.sin(remaining * 30) * 0.003 * (1 - remaining) : 0;
      ease = base + wobbleAmt;
    }

    currentAngle = startAngle + totalDist * ease;
    drawWheel(currentAngle);

    if (t < 1) {
      requestAnimationFrame(frame);
    } else {
      currentAngle = startAngle + totalDist;
      drawWheel(currentAngle);
      setTimeout(function() { goPage(4); }, 1000);
    }
  }

  requestAnimationFrame(frame);
}

// ====== Page 4: Result + Fireworks ======
function showResult() {
  var c = config || cloneObj(DEFAULTS);
  var i = lastResult;
  document.getElementById('resultAward').textContent = AWARDS_ICONS[i] + ' ' + AWARDS[i];
  document.getElementById('resultPrize').textContent = c.prizes ? c.prizes[i] : DEFAULTS.prizes[i];
  launchFireworks();
}

// ====== Fireworks ======
function launchFireworks() {
  var c = document.getElementById('fwCanvas');
  var fctx = c.getContext('2d');
  c.width = window.innerWidth;
  c.height = window.innerHeight;

  var particles = [];
  var colors = ['#ff6b6b','#feca57','#48dbfb','#ff9ff3','#54a0ff','#5f27cd','#ffd200','#ff9a44','#51cf66'];

  function createBurst(x, y, count) {
    for (var i = 0; i < count; i++) {
      var angle = (Math.PI * 2 / count) * i + (Math.random() - 0.5) * 0.3;
      var speed = 2 + Math.random() * 5;
      particles.push({
        x: x, y: y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1,
        decay: 0.008 + Math.random() * 0.008,
        color: colors[Math.floor(Math.random() * colors.length)],
        size: 2 + Math.random() * 3,
        gravity: 0.03 + Math.random() * 0.02,
        trail: []
      });
    }
  }

  var bursts = [
    { t: 0, x: 0.3, y: 0.3 },
    { t: 400, x: 0.7, y: 0.25 },
    { t: 800, x: 0.5, y: 0.4 },
    { t: 1200, x: 0.2, y: 0.5 },
    { t: 1600, x: 0.8, y: 0.45 }
  ];

  var startTime = performance.now();
  var firedBursts = 0;

  function frame(now) {
    var elapsed = now - startTime;
    fctx.fillStyle = 'rgba(0,0,0,0.08)';
    fctx.fillRect(0, 0, c.width, c.height);

    while (firedBursts < bursts.length && elapsed >= bursts[firedBursts].t) {
      var b = bursts[firedBursts];
      createBurst(b.x * c.width, b.y * c.height, 40 + Math.floor(Math.random() * 30));
      firedBursts++;
    }

    for (var i = particles.length - 1; i >= 0; i--) {
      var p = particles[i];
      p.trail.push({ x: p.x, y: p.y });
      if (p.trail.length > 6) p.trail.shift();

      p.x += p.vx;
      p.vy += p.gravity;
      p.y += p.vy;
      p.vx *= 0.99;
      p.vy *= 0.99;
      p.life -= p.decay;

      if (p.life <= 0) {
        particles.splice(i, 1);
        continue;
      }

      if (p.trail.length > 1) {
        fctx.beginPath();
        fctx.moveTo(p.trail[0].x, p.trail[0].y);
        for (var j = 1; j < p.trail.length; j++) {
          fctx.lineTo(p.trail[j].x, p.trail[j].y);
        }
        fctx.strokeStyle = p.color;
        fctx.lineWidth = p.size * 0.5 * p.life;
        fctx.globalAlpha = p.life * 0.3;
        fctx.stroke();
      }

      fctx.globalAlpha = p.life;
      fctx.beginPath();
      fctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      fctx.fillStyle = p.color;
      fctx.fill();

      fctx.globalAlpha = p.life * 0.3;
      fctx.beginPath();
      fctx.arc(p.x, p.y, p.size * p.life * 2.5, 0, Math.PI * 2);
      fctx.fillStyle = p.color;
      fctx.fill();
    }

    fctx.globalAlpha = 1;

    if (particles.length > 0 || firedBursts < bursts.length) {
      requestAnimationFrame(frame);
    } else {
      fctx.clearRect(0, 0, c.width, c.height);
    }
  }

  requestAnimationFrame(frame);
}

// ====== Helpers ======
function lighten(hex, amt) {
  var num = parseInt(hex.slice(1), 16);
  var r = Math.min(255, (num >> 16) + amt);
  var g = Math.min(255, ((num >> 8) & 0xff) + amt);
  var b = Math.min(255, (num & 0xff) + amt);
  return 'rgb(' + r + ',' + g + ',' + b + ')';
}
function darken(hex, amt) {
  var num = parseInt(hex.slice(1), 16);
  var r = Math.max(0, (num >> 16) - amt);
  var g = Math.max(0, ((num >> 8) & 0xff) - amt);
  var b = Math.max(0, (num & 0xff) - amt);
  return 'rgb(' + r + ',' + g + ',' + b + ')';
}
function cloneObj(obj) {
  var result = {};
  for (var k in obj) {
    if (obj.hasOwnProperty(k)) result[k] = obj[k];
  }
  return result;
}

// Background bubbles
function createBubbles() {
  var container = document.getElementById('bubbles');
  var colors = ['var(--pink)','var(--purple)','var(--blue)','var(--yellow)','var(--green)'];
  for (var i = 0; i < 15; i++) {
    var b = document.createElement('span');
    var size = 20 + Math.random() * 80;
    b.style.cssText =
      'width:' + size + 'px;height:' + size + 'px;' +
      'left:' + (Math.random()*100) + '%;' +
      'background:' + colors[Math.floor(Math.random()*colors.length)] + ';' +
      'animation-duration:' + (8 + Math.random()*12) + 's;' +
      '-webkit-animation-duration:' + (8 + Math.random()*12) + 's;' +
      'animation-delay:' + (Math.random()*10) + 's;' +
      '-webkit-animation-delay:' + (Math.random()*10) + 's;';
    container.appendChild(b);
  }
}

// Resize handler
window.addEventListener('resize', function() {
  var c = document.getElementById('fwCanvas');
  if (c) { c.width = window.innerWidth; c.height = window.innerHeight; }
});

// ====== Init ======
createBubbles();
goPage(config ? 2 : 1);
</script>
